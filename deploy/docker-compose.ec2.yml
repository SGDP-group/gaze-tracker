#!/bin/bash

# Production Docker Compose for EC2 Deployment
# Optimized for t3.micro instance

version: '3.8'

services:
  # Redis for Celery broker and backend
  redis:
    image: redis:7-alpine
    container_name: gaze_tracker_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --port 6379 --requirepass ${REDIS_PASSWORD}
    networks:
      - gaze_tracker_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main API server
  api:
    image: ${DOCKER_REGISTRY:-focus-tracker}:${IMAGE_TAG:-latest}
    container_name: gaze_tracker_api
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Performance tuning for t3.micro
      - WORKER_CONCURRENCY=1
      - MAX_REALISTIC_FOCUS_SCORE=95.0
      - HIGH_FOCUS_THRESHOLD=85.0
      - FOCUS_BUFFER_SIZE=50
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./model:/app/model
      - batch_worker_pids:/app/.celery_pids
      - temp_frames:/tmp/test_session_frames
      - ./streams:/app/streams
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 512M  # Suitable for t3.micro
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Celery Batch Worker 1
  batch_worker_1:
    image: ${DOCKER_REGISTRY:-focus-tracker}:${IMAGE_TAG:-latest}
    container_name: gaze_tracker_batch_worker_1
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WORKER_NAME=batch_worker_1
      - WORKER_CONCURRENCY=1
    volumes:
      - ./logs:/app/logs
      - ./model:/app/model
      - batch_worker_pids:/app/.celery_pids
      - temp_frames:/tmp/test_session_frames
      - ./streams:/app/streams
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: uv run celery -A src.services.batch_worker worker --loglevel=INFO --queues=batch_processing --concurrency=1 --hostname=batch_worker_1 --logfile=/app/logs/batch_worker_1.log --pidfile=/app/.celery_pids/batch_worker_1.pid
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Celery Batch Worker 2
  batch_worker_2:
    image: ${DOCKER_REGISTRY:-focus-tracker}:${IMAGE_TAG:-latest}
    container_name: gaze_tracker_batch_worker_2
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WORKER_NAME=batch_worker_2
      - WORKER_CONCURRENCY=1
    volumes:
      - ./logs:/app/logs
      - ./model:/app/model
      - batch_worker_pids:/app/.celery_pids
      - temp_frames:/tmp/test_session_frames
      - ./streams:/app/streams
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: uv run celery -A src.services.batch_worker worker --loglevel=INFO --queues=batch_processing --concurrency=1 --hostname=batch_worker_2 --logfile=/app/logs/batch_worker_2.log --pidfile=/app/.celery_pids/batch_worker_2.pid
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Celery Flower for monitoring
  flower:
    image: ${DOCKER_REGISTRY:-focus-tracker}:${IMAGE_TAG:-latest}
    container_name: gaze_tracker_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    command: uv run celery -A src.services.celery_app flower --port=5555 --broker=redis://:${REDIS_PASSWORD}@redis:6379/0 --basic_auth=admin:${FLOWER_PASSWORD}
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

  # Optional: Nginx reverse proxy (commented for initial deployment)
  # nginx:
  #   image: nginx:alpine
  #   container_name: gaze_tracker_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - gaze_tracker_network
  #   profiles:
  #     - production

volumes:
  redis_data:
    driver: local
  batch_worker_pids:
    driver: local
  temp_frames:
    driver: local

networks:
  gaze_tracker_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
