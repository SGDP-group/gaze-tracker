version: '3.8'

services:
  # Redis for Celery broker and backend
  redis:
    image: redis:7-alpine
    container_name: gaze_tracker_redis
    restart: always
    ports:
      - "127.0.0.1:6380:6379"  # Bind to localhost only
    volumes:
      - redis_data:/data
      - ./redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Main API server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaze_tracker_api
    restart: always
    ports:
      - "127.0.0.1:8002:8002"  # Bind to localhost only
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - WORKERS=4
      - MAX_CONNECTIONS=100
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./model:/app/model
      - batch_worker_pids:/app/.celery_pids
      - temp_frames:/tmp/test_session_frames
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Batch Worker 1
  batch_worker_1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaze_tracker_batch_worker_1
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - WORKER_NAME=batch_worker_1
      - WORKER_CONCURRENCY=2  # Increased for production
    volumes:
      - ./logs:/app/logs
      - ./model:/app/model
      - batch_worker_pids:/app/.celery_pids
      - temp_frames:/tmp/test_session_frames
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: uv run celery -A src.services.batch_worker worker --loglevel=INFO --queues=batch_processing --concurrency=2 --hostname=batch_worker_1 --logfile=/app/logs/batch_worker_1.log --pidfile=/app/.celery_pids/batch_worker_1.pid --max-tasks-per-child=10
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Celery Batch Worker 2
  batch_worker_2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaze_tracker_batch_worker_2
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - WORKER_NAME=batch_worker_2
      - WORKER_CONCURRENCY=2
    volumes:
      - ./logs:/app/logs
      - ./model:/app/model
      - batch_worker_pids:/app/.celery_pids
      - temp_frames:/tmp/test_session_frames
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: uv run celery -A src.services.batch_worker worker --loglevel=INFO --queues=batch_processing --concurrency=2 --hostname=batch_worker_2 --logfile=/app/logs/batch_worker_2.log --pidfile=/app/.celery_pids/batch_worker_2.pid --max-tasks-per-child=10
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Celery Beat for scheduled tasks
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaze_tracker_celery_beat
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
      - celerybeat_data:/app/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    command: uv run celery -A src.services.celery_app beat --loglevel=INFO --schedule=/app/celerybeat-schedule/celerybeat-schedule --pidfile=/app/.celery_pids/celerybeat.pid
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Celery Flower for monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaze_tracker_flower
    restart: always
    ports:
      - "127.0.0.1:5555:5555"  # Bind to localhost only
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=admin:flower_secure_password_123
    depends_on:
      redis:
        condition: service_healthy
    command: uv run celery -A src.services.celery_app flower --port=5555 --broker=redis://redis:6379/0 --basic_auth=admin:flower_secure_password_123 --max_tasks=1000
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Redis Commander for GUI management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gaze_tracker_redis_commander
    restart: always
    ports:
      - "127.0.0.1:8081:8081"  # Bind to localhost only
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=  # Add password if configured
    depends_on:
      - redis
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: gaze_tracker_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./examples/web_demo_client.html:/var/www/html/index.html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - gaze_tracker_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  batch_worker_pids:
    driver: local
  temp_frames:
    driver: local
  celerybeat_data:
    driver: local

networks:
  gaze_tracker_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
